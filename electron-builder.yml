appId: com.prism.player
productName: Prism Player
asarUnpack:
  - node_modules/@ffmpeg-installer/**
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  fileAssociations:
    - ext: mp4
      name: MPEG-4 Video
      role: Viewer
    - ext: mkv
      name: Matroska Video
      role: Viewer
    - ext: webm
      name: WebM Video
      role: Viewer
    - ext: avi
      name: AVI Video
      role: Viewer
    - ext: mov
      name: QuickTime Video
      role: Viewer
    - ext: flv
      name: Flash Video
      role: Viewer
    - ext: wmv
      name: Windows Media Video
      role: Viewer
    - ext: rmvb
      name: RealMedia Variable Bitrate
      role: Viewer
    - ext: rm
      name: RealMedia Video
      role: Viewer
    - ext: m4v
      name: MPEG-4 Video
      role: Viewer
    - ext: ts
      name: MPEG Transport Stream
      role: Viewer
    - ext: m2ts
      name: Blu-ray MPEG-2 Transport Stream
      role: Viewer
    - ext: mpg
      name: MPEG Video
      role: Viewer
    - ext: mpeg
      name: MPEG Video
      role: Viewer
    - ext: vob
      name: DVD Video
      role: Viewer
    - ext: ogv
      name: Ogg Video
      role: Viewer
    - ext: asf
      name: Advanced Systems Format
      role: Viewer
  hardenedRuntime: true
  entitlements: null
  entitlementsInherit: null
dmg:
  title: Prism Player ${version}
  artifactName: Prism-Player-${version}-${arch}.dmg
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target: AppImage
  category: Video
